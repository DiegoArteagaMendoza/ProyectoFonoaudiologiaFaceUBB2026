services:
  db:
    image: postgres:15-alpine
    container_name: fonoDevDB
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: fonoDevDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_fonoDev
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com  # Correo para iniciar sesión en pgAdmin
      PGADMIN_DEFAULT_PASSWORD: root          # Contraseña para iniciar sesión en pgAdmin
    ports:
      - "5050:80"                             # Acceso web a través de localhost:5050
    depends_on:
      - db                                    # Asegura que la BD inicie antes que pgAdmin

volumes:
  postgres_data: